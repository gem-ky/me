<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeonTime — Смотреть Аниме Онлайн</title>
    <link rel="stylesheet" href="style.css">
    <!-- Новый надежный пак иконок FontAwesome -->
    <link rel="stylesheet" href="https://cloudflare.com">
</head>
<body>

    <!-- Боковая панель навигации -->
    <nav class="sidebar">
        <div class="logo">
            <i class="fa-solid fa-film icon-logo"></i>
            <h2>Neon<span>Time</span></h2>
        </div>
        <ul class="nav-links">
            <li class="active"><a href="index.html"><i class="fa-solid fa-house"></i> Главная</a></li>
            <li><a href="#trending"><i class="fa-solid fa-fire"></i> В тренде</a></li>
            <li><a href="#favorites"><i class="fa-solid fa-heart"></i> Мой список</a></li>
            <li><a href="#settings"><i class="fa-solid fa-gear"></i> Настройки</a></li>
        </ul>
    </nav>

    <!-- Основной контент -->
    <main class="main-content">
        <!-- Шапка с поиском -->
        <header class="top-header">
            <div class="search-bar">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="anime-search" placeholder="Поиск аниме по названию...">
            </div>
            <div class="user-profile">
                <i class="fa-solid fa-user"></i>
                <span class="username">Войти через Shikimori</span>
            </div>
        </header>

        <!-- Секция с контентом -->
        <section class="catalog-section">
            <h1 class="section-title">Популярное аниме</h1>
            <div class="anime-grid" id="catalog-grid">
                <div class="loading-shimmer">Загрузка каталога...</div>
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>

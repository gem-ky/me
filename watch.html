<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Просмотр Аниме — NeonTime</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="watch-body">

    <a href="index.html" class="back-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg> На главную
    </a>

    <div class="watch-container">
        <div class="player-section">
            <h1 id="anime-title-watch">Загрузка...</h1>
            <div class="player-wrapper-neon">
                <div id="player-placeholder" class="player-loading">Ищем плееры...</div>
            </div>
        </div>

        <div class="anime-details-box">
            <div class="details-grid">
                <img id="anime-poster-watch" src="" alt="Постер">
                <div class="details-info">
                    <p class="anime-meta"><strong>Статус:</strong> <span id="anime-status">-</span></p>
                    <p class="anime-meta"><strong>Эпизоды:</strong> <span id="anime-episodes">-</span></p>
                    <p class="anime-meta"><strong>Рейтинг:</strong> <span id="anime-rating-watch">-</span></p>
                    
                    <button id="fav-btn" class="fav-button">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
                        <span>Добавить в список</span>
                    </button>

                    <p class="anime-description" id="anime-desc">Загрузка информации...</p>
                </div>
            </div>
        </div>
    </div>

    <script src="watch.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Вход — Tunime</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="auth-wrap">
  <div class="auth-card">
    <h1 id="auth-title">Вход</h1>
    <p class="sub" id="auth-sub">Продолжи с того места, где остановился</p>

    <form id="auth-form">
      <div class="field" id="username-field" style="display:none">
        <label>Имя пользователя</label>
        <input name="username" type="text" autocomplete="username">
      </div>
      <div class="field">
        <label>Почта</label>
        <input name="email" type="email" required autocomplete="email">
      </div>
      <div class="field">
        <label>Пароль</label>
        <input name="password" type="password" required autocomplete="current-password" minlength="6">
      </div>
      <button type="submit" class="btn btn-primary auth-submit">Войти</button>
      <div class="auth-error" id="auth-error"></div>
    </form>

    <div class="auth-switch">
      <span id="switch-text">Нет аккаунта?</span>
      <a href="#" id="switch-link">Зарегистрироваться</a>
    </div>
  </div>
</div>

<script src="app.js"></script>
<script>
  let mode = 'login';
  const titleEl = document.getElementById('auth-title');
  const subEl = document.getElementById('auth-sub');
  const usernameField = document.getElementById('username-field');
  const switchText = document.getElementById('switch-text');
  const switchLink = document.getElementById('switch-link');
  const submitBtn = document.querySelector('.auth-submit');

  function applyMode() {
    if (mode === 'login') {
      titleEl.textContent = 'Вход';
      subEl.textContent = 'Продолжи с того места, где остановился';
      usernameField.style.display = 'none';
      submitBtn.textContent = 'Войти';
      switchText.textContent = 'Нет аккаунта?';
      switchLink.textContent = 'Зарегистрироваться';
    } else {
      titleEl.textContent = 'Регистрация';
      subEl.textContent = 'Создай аккаунт, чтобы вести список аниме';
      usernameField.style.display = 'block';
      submitBtn.textContent = 'Создать аккаунт';
      switchText.textContent = 'Уже есть аккаунт?';
      switchLink.textContent = 'Войти';
    }
  }

  switchLink.addEventListener('click', (e) => {
    e.preventDefault();
    mode = mode === 'login' ? 'register' : 'login';
    applyMode();
  });

  handleAuthSubmit(() => mode);
</script>
</body>
</html>

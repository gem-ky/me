<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Страница не найдена — Tunime</title>
<link rel="stylesheet" href="style.css">
<link rel="icon" href="icons/icon-192.png">
<meta name="theme-color" content="#15111a">
<style>
  .notfound-wrap {
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center; text-align: center; padding: 24px;
  }
  .notfound-code {
    font-family: var(--font-display); font-style: italic; font-weight: 600;
    font-size: 120px; color: var(--accent); line-height: 1;
  }
  .notfound-wrap p { color: var(--text-dim); margin: 16px 0 28px; font-size: 15px; }
</style>
</head>
<body>
  <div class="notfound-wrap">
    <div class="notfound-code">404</div>
    <p>Эта страница потерялась где-то между сериями.</p>
    <a href="index.html" class="btn btn-primary">Вернуться в каталог</a>
  </div>
</body>
</html>

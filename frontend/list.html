<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Мой список — Tunime</title>
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.png">
<meta name="theme-color" content="#15111a">
</head>
<body>

<header class="site-header">
  <div class="logo">tuni<span>me</span></div>
  <nav class="nav-links">
    <a href="index.html">Каталог</a>
    <a href="list.html" class="active">Мой список</a>
  </nav>
  <div class="header-right">
    <div id="auth-slot"></div>
  </div>
</header>

<section class="section">
  <div class="section-head">
    <h2>Мой список</h2>
  </div>
  <div class="grid" id="list-grid"></div>
</section>

<script src="app.js"></script>
<script>
  async function loadMyList() {
    const grid = document.getElementById('list-grid');
    const token = getToken();
    if (!token) {
      grid.innerHTML = `<div class="empty-state">Войди в аккаунт, чтобы вести список просмотра.<br><br><a href="login.html" class="btn btn-primary">Войти</a></div>`;
      return;
    }
    try {
      const res = await fetch(`${API_BASE}/list`, {
        headers: { Authorization: `Bearer ${token}` }
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);
      if (data.length === 0) {
        grid.innerHTML = `<div class="empty-state">Список пуст. Добавь тайтлы из каталога.</div>`;
        return;
      }
      grid.innerHTML = data.map(entry => `
        <div class="card">
          <div class="card-body">
            <div class="card-title">Anime #${entry.animeId}</div>
            <div class="card-meta">${entry.status || 'без статуса'} · серия ${entry.episodesWatched || 0}</div>
          </div>
        </div>
      `).join('');
    } catch (err) {
      grid.innerHTML = `<div class="empty-state">Не удалось загрузить список</div>`;
    }
  }
  document.addEventListener('DOMContentLoaded', loadMyList);
</script>
</body>
</html>

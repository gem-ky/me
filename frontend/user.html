<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Профиль — Tunime</title>
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.png">
<meta name="theme-color" content="#15111a">
<style>
  .profile-wrap { padding: 56px 48px; max-width: 640px; }
  .profile-head { display: flex; align-items: center; gap: 20px; margin-bottom: 36px; }
  .profile-avatar {
    width: 72px; height: 72px; border-radius: 50%;
    background: linear-gradient(160deg, var(--accent), #4a1520);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-display); font-size: 32px; font-style: italic;
  }
  .profile-name { font-family: var(--font-display); font-size: 30px; font-weight: 600; }
  .profile-email { color: var(--text-faint); font-size: 13px; font-family: var(--font-mono); }
  .stats-row { display: flex; gap: 16px; margin-bottom: 32px; }
  .stat-box {
    flex: 1; background: var(--bg-elevated); border: 1px solid var(--border);
    border-radius: 6px; padding: 18px; text-align: center;
  }
  .stat-num { font-family: var(--font-display); font-size: 28px; color: var(--gold); }
  .stat-label { font-family: var(--font-mono); font-size: 11px; color: var(--text-faint); margin-top: 4px; }
</style>
</head>
<body>

<header class="site-header">
  <div class="logo">tuni<span>me</span></div>
  <nav class="nav-links">
    <a href="index.html">Каталог</a>
    <a href="list.html">Мой список</a>
  </nav>
  <div class="header-right"><div id="auth-slot"></div></div>
</header>

<div class="profile-wrap" id="profile-content">
  <div class="empty-state">Загружаю...</div>
</div>

<script src="app.js"></script>
<script>
  async function loadProfile() {
    const container = document.getElementById('profile-content');
    const user = getUser();
    const token = getToken();

    if (!user || !token) {
      container.innerHTML = `<div class="empty-state">Войди в аккаунт, чтобы увидеть профиль.<br><br><a href="login.html" class="btn btn-primary">Войти</a></div>`;
      return;
    }

    let list = [];
    try {
      const res = await fetch(`${API_BASE}/list`, { headers: { Authorization: `Bearer ${token}` } });
      list = await res.json();
    } catch {}

    const counts = { watching: 0, planned: 0, completed: 0, on_hold: 0, dropped: 0 };
    list.forEach(e => { if (counts[e.status] !== undefined) counts[e.status]++; });

    container.innerHTML = `
      <div class="profile-head">
        <div class="profile-avatar">${user.username[0].toUpperCase()}</div>
        <div>
          <div class="profile-name">${user.username}</div>
          <div class="profile-email">${user.email}</div>
        </div>
      </div>
      <div class="stats-row">
        <div class="stat-box"><div class="stat-num">${counts.watching}</div><div class="stat-label">смотрю</div></div>
        <div class="stat-box"><div class="stat-num">${counts.completed}</div><div class="stat-label">просмотрено</div></div>
        <div class="stat-box"><div class="stat-num">${counts.planned}</div><div class="stat-label">в планах</div></div>
        <div class="stat-box"><div class="stat-num">${list.length}</div><div class="stat-label">всего в списке</div></div>
      </div>
      <a href="list.html" class="btn btn-primary">Открыть мой список</a>
    `;
  }

  document.addEventListener('DOMContentLoaded', () => {
    renderAuthState();
    loadProfile();
  });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tunime</title>
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
<style>
  .title-hero {
    display: grid;
    grid-template-columns: 260px 1fr;
    gap: 40px;
    padding: 48px;
    border-bottom: 1px solid var(--border);
  }
  .title-poster {
    aspect-ratio: 2/3;
    border-radius: 6px;
    overflow: hidden;
    border: 1px solid var(--border);
    background: var(--bg-card);
  }
  .title-poster img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .title-kind {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 12px;
  }
  .title-name {
    font-family: var(--font-display);
    font-size: 48px;
    font-weight: 600;
    line-height: 1.1;
    margin-bottom: 6px;
  }
  .title-name-original { color: var(--text-faint); font-size: 16px; margin-bottom: 20px; }
  .title-stats {
    display: flex;
    gap: 24px;
    margin-bottom: 24px;
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--text-dim);
  }
  .title-stats b { color: var(--gold); }
  .genre-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 24px; }
  .genre-tag {
    font-size: 11px;
    font-family: var(--font-mono);
    padding: 4px 10px;
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--text-dim);
  }
  .title-desc { color: var(--text-dim); line-height: 1.7; max-width: 640px; margin-bottom: 28px; }
  .list-controls {
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 18px 20px;
    max-width: 560px;
  }
  .list-controls select, .list-controls input[type="number"] {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 3px;
    padding: 8px 10px;
    font-family: var(--font-body);
    font-size: 13px;
  }
  .list-controls label { font-family: var(--font-mono); font-size: 11px; color: var(--text-faint); display: block; margin-bottom: 5px; }
  .list-controls .field-inline { display: flex; flex-direction: column; }
  .save-status { font-family: var(--font-mono); font-size: 12px; color: var(--gold); margin-left: auto; opacity: 0; transition: opacity 0.3s; }
  .save-status.show { opacity: 1; }
</style>
</head>
<body>

<header class="site-header">
  <div class="logo">tuni<span>me</span></div>
  <nav class="nav-links">
    <a href="index.html">Каталог</a>
    <a href="list.html">Мой список</a>
  </nav>
  <div class="header-right">
    <div id="auth-slot"></div>
  </div>
</header>

<div id="title-content">
  <div class="empty-state" style="padding:80px 20px">Загружаю...</div>
</div>

<script src="app.js"></script>
<script>
  const STATUS_LABELS = {
    watching: 'Смотрю',
    planned: 'В планах',
    completed: 'Просмотрено',
    on_hold: 'Отложено',
    dropped: 'Брошено'
  };

  function getAnimeIdFromUrl() {
    return new URLSearchParams(window.location.search).get('id');
  }

  async function loadTitle() {
    const id = getAnimeIdFromUrl();
    const container = document.getElementById('title-content');
    if (!id) {
      container.innerHTML = `<div class="empty-state" style="padding:80px 20px">Тайтл не указан</div>`;
      return;
    }

    let anime;
    try {
      const res = await fetch(`${API_BASE}/anime/${id}`);
      if (!res.ok) throw new Error();
      anime = await res.json();
    } catch {
      container.innerHTML = `<div class="empty-state" style="padding:80px 20px">Не удалось загрузить данные тайтла.<br>Проверь, что бэкенд запущен на ${API_BASE}</div>`;
      return;
    }

    const title = anime.russian || anime.name;
    const poster = anime.image?.original ? `https://shikimori.one${anime.image.original}` : '';
    const genres = (anime.genres || []).map(g => `<span class="genre-tag">${g.russian || g.name}</span>`).join('');
    const episodes = anime.episodes || anime.episodes_aired || '?';

    container.innerHTML = `
      <div class="title-hero">
        <div class="title-poster">${poster ? `<img src="${poster}" alt="${title}">` : ''}</div>
        <div>
          <div class="title-kind">${(anime.kind || '').toUpperCase()} · ${anime.status === 'released' ? 'вышло' : anime.status === 'ongoing' ? 'выходит' : 'анонс'}</div>
          <div class="title-name">${title}</div>
          <div class="title-name-original">${anime.name || ''}</div>
          <div class="title-stats">
            <div>★ <b>${anime.score && anime.score !== '0' ? anime.score : '—'}</b></div>
            <div>Эпизодов: <b>${episodes}</b></div>
            <div>Год: <b>${anime.aired_on ? anime.aired_on.slice(0,4) : '—'}</b></div>
          </div>
          <div class="genre-tags">${genres}</div>
          <p class="title-desc">${(anime.description || 'Описание отсутствует.').replace(/\[.*?\]/g, '').slice(0, 500)}</p>
          <div id="list-controls-slot"></div>
        </div>
      </div>
    `;

    renderListControls(id, episodes);
  }

  async function renderListControls(animeId, totalEpisodes) {
    const slot = document.getElementById('list-controls-slot');
    const token = getToken();

    if (!token) {
      slot.innerHTML = `<a href="login.html" class="btn btn-primary">Войти, чтобы добавить в список</a>`;
      return;
    }

    // Подтягиваем текущее состояние записи, если она уже есть в списке пользователя
    let existing = null;
    try {
      const res = await fetch(`${API_BASE}/list`, { headers: { Authorization: `Bearer ${token}` } });
      const list = await res.json();
      existing = list.find(e => String(e.animeId) === String(animeId));
    } catch {}

    slot.innerHTML = `
      <div class="list-controls">
        <div class="field-inline">
          <label>Статус</label>
          <select id="status-select">
            <option value="">— не в списке —</option>
            ${Object.entries(STATUS_LABELS).map(([val, label]) =>
              `<option value="${val}" ${existing?.status === val ? 'selected' : ''}>${label}</option>`
            ).join('')}
          </select>
        </div>
        <div class="field-inline">
          <label>Серия</label>
          <input type="number" id="episodes-input" min="0" max="${totalEpisodes || 999}" value="${existing?.episodesWatched || 0}" style="width:70px">
        </div>
        <div class="field-inline">
          <label>Оценка</label>
          <input type="number" id="score-input" min="1" max="10" value="${existing?.score || ''}" style="width:60px">
        </div>
        <button class="btn btn-primary" id="save-list-btn" style="align-self:flex-end">Сохранить</button>
        <span class="save-status" id="save-status">Сохранено ✓</span>
      </div>
    `;

    document.getElementById('save-list-btn').addEventListener('click', async () => {
      const status = document.getElementById('status-select').value;
      const episodesWatched = Number(document.getElementById('episodes-input').value) || 0;
      const score = Number(document.getElementById('score-input').value) || null;
      const statusEl = document.getElementById('save-status');

      try {
        if (!status) {
          await fetch(`${API_BASE}/list/${animeId}`, {
            method: 'DELETE',
            headers: { Authorization: `Bearer ${token}` }
          });
        } else {
          await fetch(`${API_BASE}/list/${animeId}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
            body: JSON.stringify({ status, episodesWatched, score })
          });
        }
        statusEl.classList.add('show');
        setTimeout(() => statusEl.classList.remove('show'), 2000);
      } catch {
        statusEl.textContent = 'Ошибка сохранения';
        statusEl.classList.add('show');
      }
    });
  }

  document.addEventListener('DOMContentLoaded', () => {
    renderAuthState();
    loadTitle();
  });
</script>
</body>
</html>
